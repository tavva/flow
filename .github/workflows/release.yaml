name: Release Flow

on:
    push:
        tags:
            - '*'

permissions:
    contents: write
    id-token: write
    attestations: write
    artifact-metadata: write

jobs:
    release:
        runs-on: ubuntu-latest
        env:
            TAG_NAME: ${{ github.ref_name }}

        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: '24.x'

            - name: Ensure versions match tag
              run: |
                  node - <<'NODE'
                  const fs = require('fs')
                  const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
                  const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'))
                  const tag = process.env.TAG_NAME || ''
                  const normalizedTag = tag.startsWith('v') ? tag.slice(1) : tag
                  if (pkg.version !== manifest.version) {
                      console.error(`package.json version ${pkg.version} does not match manifest.json version ${manifest.version}`)
                      process.exit(1)
                  }
                  if (pkg.version !== normalizedTag) {
                      console.error(`Version ${pkg.version} does not match tag ${tag}`)
                      process.exit(1)
                  }
                  NODE

            - name: Cache npm
              uses: actions/cache@v5
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-

            - name: Install dependencies
              run: npm ci

            - name: Verify build and tests
              run: npm run verify

            - name: Verify release assets
              run: |
                  test -f manifest.json
                  test -f main.js
                  test -f styles.css

            - name: Generate artifact attestations
              uses: actions/attest@v4
              with:
                  subject-path: |
                      manifest.json
                      main.js
                      styles.css

            - name: Ensure draft release exists
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
                      normalized_tag="${TAG_NAME#v}"
                      gh release create "$TAG_NAME" --title "v${normalized_tag}" --draft --generate-notes
                  fi

            - name: Upload release assets
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release upload "$TAG_NAME" manifest.json main.js styles.css --clobber
